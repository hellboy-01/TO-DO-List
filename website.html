<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #1c1c1c;
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h2 {
    margin: 0;
}

.input-box {
    display: flex;
    margin: 20px 0;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #888;
    color: white;
}


ul {
    list-style: none;
    padding: 0;
}

li {
    background: #2a2a2a;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

li span {
    cursor: pointer;
}

.completed {
    text-decoration: line-through;
    color: gray;
}

.delete-btn {
    color: red;
    cursor: pointer;
}

.delete-all {
    width: 100%;
    margin-top: 15px;
    background: #ff4d4d;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <h2>To-Do-List</h2>
        <span>📝</span>
    </div>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Add your text">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

    <button class="delete-all" onclick="deleteAll()">Delete All</button>
</div>

<script>
const input = document.getElementById("taskInput");
const list = document.getElementById("taskList");


function addTask() {
    if (input.value === "") return;

    let li = document.createElement("li");

    let span = document.createElement("span");
    span.textContent = input.value;


    span.onclick = function () {
        span.classList.toggle("completed");
    };

    
    let del = document.createElement("span");
    del.textContent = "🗑️";
    del.className = "delete-btn";

    del.onclick = function () {
        li.remove();
    };

    li.appendChild(span);
    li.appendChild(del);

    list.appendChild(li);

    input.value = "";
}

function deleteAll() {
    list.innerHTML = "";
}
</script>

</body>
</html>
